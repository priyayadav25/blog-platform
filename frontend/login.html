<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h1>Login</h1>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Enter Email"
required>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

<button type="submit">

Login

</button>

</form>

<p id="message"></p>

<p>

Don't have an account?

<a href="register.html">

Register

</a>

</p>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit", login);

async function login(e){

e.preventDefault();

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

const response =
await fetch(
"http://localhost:5000/api/auth/login",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email,
password

})

});

const data =
await response.json();

if(response.ok){

localStorage.setItem(
"token",
data.token
);

localStorage.setItem(
"username",
data.username
);

localStorage.setItem(
"email",
data.email
);

window.location =
"dashboard.html";

}else{

document
.getElementById("message")
.innerHTML=data.message;

}

}catch(error){

document
.getElementById("message")
.innerHTML=
"Server Error";

}

}

</script>

</body>

</html>
