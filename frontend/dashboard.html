<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h1>Blog Dashboard</h1>

<p>

Welcome,

<b id="userName"></b>

</p>

<button onclick="logout()">

Logout

</button>

<hr>

<h2>Create Blog Post</h2>

<form id="postForm">

<input
type="text"
id="title"
placeholder="Blog Title"
required>

<textarea
id="content"
placeholder="Write your blog..."
rows="6"
required></textarea>

<button
id="publishBtn"
type="submit">

Publish Blog

</button>

</form>

<hr>

<h2>All Blog Posts</h2>

<div id="posts"></div>

</div>

<script>

const API="http://localhost:5000/api";

const token=
localStorage.getItem("token");

const username=
localStorage.getItem("username");

if(!token){

window.location="login.html";

}

document.getElementById("userName")
.innerHTML=username;

let editPostId=null;

document
.getElementById("postForm")
.addEventListener("submit",savePost);

async function savePost(e){

e.preventDefault();

const title=
document.getElementById("title").value;

const content=
document.getElementById("content").value;

const url=
editPostId
?
API+"/posts/"+editPostId
:
API+"/posts";

const method=
editPostId
?
"PUT"
:
"POST";

const response=
await fetch(url,{

method,

headers:{

"Content-Type":"application/json",

token

},

body:JSON.stringify({

title,

content

})

});

const data=
await response.json();

if(response.ok){

document
.getElementById("postForm")
.reset();

editPostId=null;

document
.getElementById("publishBtn")
.innerHTML="Publish Blog";

loadPosts();

}else{

alert(data.message);

}

}

async function loadPosts(){

const response=
await fetch(API+"/posts");

const posts=
await response.json();

let output="";

posts.forEach(post=>{

output+=`

<div class="post">

<h2>${post.title}</h2>

<p>${post.content}</p>

<p>

<b>Author:</b>

${post.author}

</p>

<p>

<small>

${new Date(post.createdAt).toLocaleString()}

</small>

</p>

<button
onclick="editPost(

'${post._id}',

\`${post.title}\`,

\`${post.content}\`

)">

Edit

</button>

<button
onclick="deletePost(

'${post._id}'

)">

Delete

</button>

<div
id="comments-${post._id}">

</div>

<input
id="comment-${post._id}"
placeholder="Write comment">

<button
onclick="addComment(

'${post._id}'

)">

Comment

</button>

</div>

`;

});

document
.getElementById("posts")
.innerHTML=output;

posts.forEach(post=>{

loadComments(post._id);

});

}
    function editPost(id,title,content){

editPostId=id;

document.getElementById("title").value=title;

document.getElementById("content").value=content;

document.getElementById("publishBtn").innerHTML="Update Blog";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

async function deletePost(id){

if(!confirm("Are you sure you want to delete this blog?")){
return;
}

const response=await fetch(API+"/posts/"+id,{

method:"DELETE",

headers:{
token:token
}

});

const data=await response.json();

alert(data.message);

loadPosts();

}

async function loadComments(postId){

const response=await fetch(API+"/comments/"+postId);

const comments=await response.json();

let output="";

comments.forEach(comment=>{

output+=`

<div class="comment">

<p>

<b>${comment.username}</b>

</p>

<p>

${comment.comment}

</p>

<hr>

</div>

`;

});

document.getElementById("comments-"+postId).innerHTML=output;

}

async function addComment(postId){

const comment=document.getElementById("comment-"+postId).value;

if(comment===""){

alert("Enter Comment");

return;

}

const response=await fetch(API+"/comments",{

method:"POST",

headers:{

"Content-Type":"application/json",

token:token

},

body:JSON.stringify({

postId,

comment

})

});

const data=await response.json();

if(response.ok){

document.getElementById("comment-"+postId).value="";

loadComments(postId);

}else{

alert(data.message);

}

}

function logout(){

localStorage.removeItem("token");

localStorage.removeItem("username");

localStorage.removeItem("email");

window.location="login.html";

}

loadPosts();

</script>

</body>

</html>
